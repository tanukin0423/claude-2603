<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業界・企業研究｜28卒 就活の木</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
<style>
:root{--gd:#2C5F2D;--gm:#4A8C4B;--gl:#97BC62;--gp:#E8F5E9;--am:#F59E0B;--al:#FEF3C7;--bl:#1D4ED8;--bll:#EFF6FF;--gy:#1F2937;--gmy:#6B7280;--glg:#F3F4F6;--sh:0 4px 20px rgba(0,0,0,0.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#f0fdf0 0%,#fefce8 60%,#f0fdf4 100%);min-height:100vh;color:var(--gy);}
.page-header{background:var(--gd);color:white;padding:20px 20px 24px;text-align:center;position:relative;}
.page-header .brand{font-size:11px;font-weight:700;letter-spacing:0.12em;color:#97BC62;margin-bottom:10px;}
.page-header .main-icon{font-size:48px;margin-bottom:8px;display:block;}
.page-header h1{font-size:26px;font-weight:900;line-height:1.2;margin-bottom:6px;}
.page-header .sub{font-size:12px;color:#C6E1C6;line-height:1.7;}
.timing-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 16px;background:white;border-bottom:2px solid var(--gp);}
.timing-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.timing-badge.green{background:var(--gp);color:var(--gd);border:1px solid #C8E6C9;}
.timing-badge.amber{background:var(--al);color:#92400E;border:1px solid #FDE68A;}
.timing-badge.red{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;}
.timing-badge.gold{background:#FEF9C3;color:#854D0E;border:1px solid #FDE68A;}
.content{max-width:680px;margin:0 auto;padding:20px 16px 40px;}
.section{background:white;border-radius:20px;box-shadow:var(--sh);margin-bottom:16px;overflow:hidden;}
.section-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #F0F0F0;}
.section-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.section-icon.what{background:#DBEAFE;}
.section-icon.how{background:#D1FAE5;}
.section-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--gmy);margin-bottom:2px;}
.section-title{font-size:15px;font-weight:700;color:var(--gy);line-height:1.3;}
.section-body{padding:18px 20px;font-size:14px;line-height:1.85;color:#374151;}
.section-body p{margin-bottom:12px;}
.section-body p:last-child{margin-bottom:0;}
.doshi{margin-top:14px;padding:14px 16px;background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-left:4px solid var(--gm);border-radius:0 12px 12px 0;font-size:13px;line-height:1.75;color:#1F4D20;}
.doshi-label{display:block;font-size:11px;font-weight:700;color:var(--gd);margin-bottom:6px;letter-spacing:0.05em;}
.new-rule{margin-top:12px;padding:14px 16px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-left:4px solid var(--bl);border-radius:0 12px 12px 0;font-size:13px;line-height:1.75;color:#1E3A8A;}
.new-rule-label{display:block;font-size:11px;font-weight:700;color:#1E40AF;margin-bottom:6px;}
.tool-desc-box{margin-top:12px;background:#F8FFF8;border:1px solid #C8E6C9;border-radius:10px;padding:12px 14px;}
.tool-desc-item{display:flex;gap:8px;margin-bottom:8px;font-size:13px;}
.tool-desc-item:last-child{margin-bottom:0;}
.tool-desc-name{font-weight:700;color:var(--gd);min-width:80px;flex-shrink:0;}
.tool-desc-text{color:#374151;line-height:1.6;}
.tool-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.tool-link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--glg);border:1.5px solid #E5E7EB;border-radius:14px;text-decoration:none;color:var(--gy);font-size:13px;font-weight:700;transition:transform 0.15s,box-shadow 0.15s,background 0.15s;cursor:pointer;width:100%;text-align:left;}
.tool-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.12);background:white;}
.tool-link .tool-icon{width:40px;height:40px;border-radius:10px;background:white;border:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tool-link .tool-text{flex:1;line-height:1.4;}
.tool-link .tool-sub{font-size:11px;color:var(--gmy);font-weight:400;margin-top:2px;}
.tool-link .arrow{color:var(--gmy);font-size:14px;}
.tool-link.featured{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:#A7F3D0;color:var(--gd);}
.tool-link.featured .arrow{color:var(--gm);}
.tool-link.blue{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-color:#BFDBFE;color:#1E40AF;}
.tool-link.blue .arrow{color:var(--bl);}
.tool-link.video{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border-color:#FDE68A;color:#92400E;}
.tool-link.video .arrow{color:var(--am);}
.tool-link.download{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);border-color:#DDD6FE;color:#5B21B6;}
.tool-link.download .arrow{color:#7C3AED;}
.expandable{display:flex;flex-direction:column;}
.expand-btn{border:none;}
.expand-body{display:none;background:#FFFBEB;border:1px solid #FDE68A;border-top:none;border-radius:0 0 12px 12px;padding:12px 16px;font-size:13px;line-height:1.75;color:#78350F;}
.expand-body.open{display:block;}
.qr-section{background:white;border-radius:20px;box-shadow:var(--sh);padding:24px 20px;text-align:center;margin-bottom:16px;border:2px solid var(--gp);}
.qr-title{font-size:12px;font-weight:700;color:var(--gmy);letter-spacing:0.1em;margin-bottom:16px;}
#qrcode{display:flex;justify-content:center;margin-bottom:14px;}
#qrcode img,#qrcode canvas{border-radius:12px;border:3px solid var(--gp);padding:8px;background:white;}
.qr-url{font-size:10px;color:var(--gmy);word-break:break-all;margin-top:8px;background:var(--glg);padding:8px 12px;border-radius:8px;}
.page-footer{text-align:center;padding:20px;font-size:12px;color:var(--gmy);border-top:1px solid #E5E7EB;background:white;}
.page-footer .footer-brand{font-weight:700;color:var(--gd);margin-bottom:4px;font-size:13px;}
@media print{body{background:white;}.page-header{background:#2C5F2D!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style>
</head>
<body>
<div class="page-header">

  <h1>業界・企業研究</h1>

    <div class="section-body"><p>「どんな業界があるか」「その業界でどんな企業が活動しているか」「自分はどんな職種で働きたいか」を調べていく作業です。</p>
<p>業界・企業・職種の3つをセットで研究することで、志望動機の「根拠」が生まれます。「なんとなく大手」「なんとなく有名」では面接を突破できません。</p>
<div class="tool-desc-box">

  <div class="tool-desc-item"><span class="tool-desc-name">🏢 企業研究</span><span class="tool-desc-text">企業の事業内容・社風・強み・課題を深掘りする。OB/OG訪問・説明会・口コミサイトを活用。</span></div>

</div>
<div class="doshi"><span class="doshi-label">🔥 キャリ爺のド推しポイント</span>「なんとなく大手では絶対に通らない時代です。業界地図1冊・OB訪問1人・説明会1つ——今すぐ動ける具体的な一歩から。」</div></div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-icon how">💡</div>
      <div>
        <div class="section-label">どうやるの？ツール</div>

    <div class="section-body">
      <p>キャリ爺オリジナルのAI活用ツールと、情報収集サイトを組み合わせて使いましょう。</p>
<div style="margin-top:12px;background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:1px solid #BBF7D0;border-radius:10px;padding:12px 14px;">
  <div style="font-size:12px;font-weight:700;color:#14532D;margin-bottom:8px;">🌱 キャリ爺オリジナルAIツール——2STEPで使おう</div>

</div>

</div>
<div class="page-footer">
